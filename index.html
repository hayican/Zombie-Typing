<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Zombie Edisi Sekolah</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="game-container">
        
        <div id="scoreboard">
            <h2>Skor: <span id="score">0</span></h2>
            <h2>HP: <span id="health">100</span></h2>
        </div>

        <div id="controls">
            <button id="pause-btn">Pause</button>
            <button id="restart-btn">Restart</button>
        </div>

        <div id="typing-display">MENUNGGU TARGET...</div>

        <div id="game-area">
            <div id="player"></div>
            <div class="lane" id="lane-1"></div>
            <div class="lane" id="lane-2"></div>
            <div class="lane" id="lane-3"></div>
            <div class="lane" id="lane-4"></div>
        </div>
 
        <div id="game-over-screen" class="overlay hidden">
            <h1>GAME OVER</h1>
            <p>Skor Akhir : <span id="final-score">0</span></p>
            <button id="restart-overlay-btn">Main Lagi</button>
        </div>

        <div id="pause-screen" class="overlay hidden">
            <h1>PAUSED</h1>
            <button id="resume-overlay-btn">Resume</button> 
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
