<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Zombie Edisi Sekolah</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="game-container">
        
        <!-- Papan Skor -->
        <div id="scoreboard">
            <h2>Skor: <span id="score">0</span></h2>
            <h2>HP: <span id="health">5</span></h2>
        </div>

        <!-- Area Bermain -->
        <div id="game-area">
            
            <!-- Karakter Pemain -->
            <div id="player"></div>

            <!-- 4 Jalur Tempat Musuh Muncul -->
            <div class="lane" id="lane-1"></div>
            <div class="lane" id="lane-2"></div>
            <div class="lane" id="lane-3"></div>
            <div class="lane" id="lane-4"></div>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
